<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="description" content="Linor — super admin control plane for hospital tenants, analytics, infrastructure, and billing." />
    <!-- Security: prevent clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Security: restrict referrer leakage -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Security: Content Security Policy — restrict script/style/connect sources -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://rsms.me; font-src 'self' https://rsms.me; img-src 'self' data: blob: https:; connect-src 'self' http://localhost:* https://localhost:*; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    <!-- Security: disable browser features we don't need -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    <title>Linor · Super Admin</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  </head>
  <body class="bg-canvas text-primary antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
